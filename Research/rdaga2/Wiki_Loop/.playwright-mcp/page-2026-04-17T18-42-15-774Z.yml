          - paragraph [ref=e550]: Action at a distance is the concept in physics that an object's motion can be affected by another object without the two being in physical contact; that is, it is the concept of the non-local interaction of objects that are separated in space. Coulomb's law and Newton's law of universal gravitation are based on action at a distance. Historically, action at a distance was the earliest scientific model for gravity and electricity and it continues to be useful in many practical cases.
