            - paragraph [ref=e607]: In the physics of electromagnetism, the Abraham–Lorentz force (also known as the Lorentz–Abraham force) is the reaction force on an accelerating charged particle caused by the particle emitting electromagnetic radiation by self-interaction. It is also called the radiation reaction force, the radiation damping force, or the self-force.
