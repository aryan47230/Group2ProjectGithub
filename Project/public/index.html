<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Tree Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- App header -->
  <header id="app-header">
    <span id="app-logo">Skill Tree Generator</span>
    <nav id="mode-tabs">
      <a href="/" class="mode-tab active">Skill Tree</a>
      <a href="/explore/" class="mode-tab">Explore</a>
    </nav>
    <div id="auth-controls">
      <span id="user-greeting" hidden></span>
      <button id="logout-btn" class="btn-ghost" hidden>Logout</button>
      <button id="signin-btn">Sign In</button>
      <button id="signup-btn" class="btn-outline">Sign Up</button>
    </div>
  </header>

  <!-- Auth modal -->
  <div id="auth-overlay" hidden>
    <div id="auth-modal">
      <div id="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Sign Up</button>
      </div>
      <form id="auth-form">
        <label for="auth-username">Username</label>
        <input id="auth-username" type="text" autocomplete="username" required />
        <label for="auth-password">Password</label>
        <input id="auth-password" type="password" autocomplete="current-password" required />
        <p id="auth-error" hidden></p>
        <button type="submit" id="auth-submit">Sign In</button>
      </form>
      <button id="auth-close" class="btn-ghost">Cancel</button>
    </div>
  </div>

  <!-- Import banner (shown after login if local trees exist) -->
  <div id="import-banner" hidden>
    <p id="import-msg"></p>
    <div>
      <button id="import-yes">Import</button>
      <button id="import-no" class="btn-ghost">No thanks</button>
    </div>
  </div>

  <!-- Prompt screen -->
  <div id="prompt-view">
    <h1>What do you want to learn?</h1>
    <form id="form">
      <input id="topic" type="text" placeholder="e.g. cooking, archery, guitar..." required />
      <button type="submit">Generate</button>
    </form>
    <div id="statusEl"></div>

    <div id="explore-cta">
      <span class="cta-divider">or explore a Wikipedia concept</span>
      <form id="explore-form">
        <input id="explore-topic" type="text" placeholder="e.g. quantum mechanics, stoicism..." />
        <button type="submit">Explore</button>
      </form>
    </div>

    <div id="saved-section" hidden>
      <h2 id="saved-heading">Your Trees</h2>
      <ul id="saved-list"></ul>
    </div>
  </div>

  <!-- Tree screen -->
  <div id="tree-view" hidden>
    <div id="tree-header">
      <button id="back-btn">&#8592; Back</button>
      <h2 id="tree-title"></h2>
      <div id="progress-wrap">
        <span id="progress-label">0 / 0</span>
        <div id="progress-track"><div id="progress-fill"></div></div>
      </div>
    </div>
    <div id="tree-body">
      <div id="graph-container">
        <svg id="graph"></svg>
      </div>

      <!-- Skill detail panel -->
      <div id="detail-panel" hidden>
        <div id="detail-header">
          <h3 id="detail-name"></h3>
          <button id="detail-close">&#10005;</button>
        </div>
        <div id="detail-level"></div>

        <div id="detail-tab-bar">
          <button class="tab-btn active" data-tab="overview">Overview</button>
          <button class="tab-btn" data-tab="learn">Learn</button>
          <button class="tab-btn" data-tab="resources">Resources</button>
        </div>

        <!-- Overview tab -->
        <div class="tab-pane active" id="tab-overview">
          <div id="detail-requires-section">
            <p class="detail-label">Requires</p>
            <ul id="detail-requires"></ul>
          </div>
          <p class="detail-label">How to develop</p>
          <p id="detail-description"></p>
          <p class="detail-label">Practice tips</p>
          <ul id="detail-tips"></ul>
          <div id="detail-outcomes-section">
            <p class="detail-label">What you'll be able to do</p>
            <ul id="detail-outcomes"></ul>
          </div>
        </div>

        <!-- Learn tab -->
        <div class="tab-pane" id="tab-learn">
          <div id="detail-concepts-section">
            <p class="detail-label">Key concepts</p>
            <ul id="detail-concepts"></ul>
          </div>
          <div id="detail-mistakes-section">
            <p class="detail-label">Common mistakes</p>
            <ul id="detail-mistakes"></ul>
          </div>
        </div>

        <!-- Resources tab -->
        <div class="tab-pane" id="tab-resources">
          <div id="detail-resources-section">
            <p class="detail-label">Resources</p>
            <ul id="detail-resources"></ul>
          </div>
        </div>

        <button id="detail-complete-btn">Mark as Complete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
